<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>3C Word Search — Well Done!</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="page" id="page">
    <div class="page-content">
      <div id="media-wrap" style="margin-bottom:12px;"></div>
      <div class="glass-card">
        <p class="page-title" style="margin-bottom:8px;">🎉 Well Done!</p>
        <p class="page-body" id="finale-text" style="margin-bottom:20px;">
          You found all the words. Excellent focus!
        </p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="playAgain()">🔄 Play Again</button>
          <button class="btn btn-ghost" onclick="quit()">Close</button>
        </div>
      </div>
    </div>
  </div>
  <div class="watermark">Built by Claude (Anthropic) × Chef Anica · 3C Thread To Success 🧪👨‍🍳</div>

  <script>
    const params = new URLSearchParams(location.search);
    const slug   = params.get('puzzle');
    const data   = JSON.parse(sessionStorage.getItem('wsPuzzle') || '{}');

    // Background
    if (data.bg_image) {
      const img = document.createElement('img');
      img.src = data.bg_image; img.className = 'bg-img'; img.alt = '';
      document.getElementById('page').prepend(img);
    }

    // Finale media
    if (data.finale_asset) {
      const wrap = document.getElementById('media-wrap');
      const ext  = data.finale_asset.split('.').pop().toLowerCase();
      if (['mp4','webm','mov','ogg'].includes(ext)) {
        wrap.innerHTML = `<video class="media-asset" autoplay muted playsinline loop>
          <source src="${data.finale_asset}"></video>`;
      } else {
        wrap.innerHTML = `<img class="media-asset" src="${data.finale_asset}" alt="Finale" />`;
      }
    }

    function playAgain() { location.href = `game.html?puzzle=${slug}`; }
    function quit()     { history.back(); }
  </script>
</body>
</html>
