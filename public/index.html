<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>3C Word Search</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <div class="page" id="page">
    <!-- Background injected by JS from sessionStorage -->

    <div class="page-content">
      <div class="glass-card" style="text-align:center;">
        <p class="page-title" id="puzzle-title" style="margin-bottom:10px;">Word Search</p>
        <p class="page-subtitle" id="word-hint" style="margin-bottom:24px;"></p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button class="btn btn-primary" id="play-btn" onclick="startGame()">
            ▶ Let's Play
          </button>
          <button class="btn btn-ghost" onclick="quit()">Quit</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const slug   = params.get('puzzle');

    // ── Load puzzle data from sessionStorage (set by landing.html on ENTER) ──
    // Falls back to worker fetch if sessionStorage is empty (direct link)
    const WORKER_URL = 'https://3c-wordsearch.3c-innertherapy.workers.dev';

    async function loadData() {
      let data = null;
      const cached = sessionStorage.getItem('wsPuzzle');
      if (cached) {
        try { data = JSON.parse(cached); } catch {}
      }

      // If no cache or wrong puzzle, fetch directly
      if (!data || (slug && data.puzzle_slug !== slug)) {
        try {
          const res = await fetch(`${WORKER_URL}/puzzle/${slug}`);
          if (res.ok) {
            data = await res.json();
            sessionStorage.setItem('wsPuzzle', JSON.stringify(data));
          }
        } catch {}
      }

      if (!data) {
        // No data at all — go straight to game and let game.html handle it
        if (slug) location.href = `game.html?puzzle=${slug}`;
        return;
      }

      // ── Background ────────────────────────────────────────────────────
      if (data.bg_image) {
        const img = document.createElement('img');
        img.src = data.bg_image;
        img.className = 'bg-img';
        img.alt = '';
        document.getElementById('page').prepend(img);
      }

      // ── Title + word count hint ────────────────────────────────────────
      const titleEl = document.getElementById('puzzle-title');
      const hintEl  = document.getElementById('word-hint');
      if (titleEl) titleEl.textContent = data.title || 'Word Search';

      const wc = (data.word_list || []).length;
      if (hintEl && wc > 0) {
        hintEl.textContent = `Find ${wc} hidden word${wc !== 1 ? 's' : ''} in the grid`;
      }
    }

    function startGame() {
      const data = JSON.parse(sessionStorage.getItem('wsPuzzle') || '{}');
      // If intro asset exists → show intro first
      if (data.intro_asset) {
        location.href = `intro.html?puzzle=${encodeURIComponent(slug)}`;
      } else {
        location.href = `game.html?puzzle=${encodeURIComponent(slug)}`;
      }
    }

    function quit() { history.back(); }

    loadData();
  </script>
</body>
</html>
