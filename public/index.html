<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>3C Word Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="../favicon.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      background: #0a0714;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Open Sans', sans-serif;
      overflow: hidden;
    }

    /* ── DEVICE CONTAINER — portrait 9:16 ── */
    .device {
      position: relative;
      width: min(390px, 56.25vh);
      aspect-ratio: 9 / 16;
      background: #1a0b2e;
      border-radius: clamp(0px, 2vw, 28px);
      overflow: hidden;
      box-shadow:
        0 0 0 1.5px rgba(124,58,237,0.35),
        0 30px 80px rgba(0,0,0,0.7);
    }

    @media (max-width: 480px) {
      body { align-items: flex-start; background: #0a0714; }
      .device {
        width: 100vw; height: 100dvh;
        border-radius: 0; box-shadow: none;
        aspect-ratio: unset;
      }
    }

    /* ── SCREEN BASE ── */
    .screen {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .screen.active { display: flex; opacity: 1; }
    .screen.fading { opacity: 0; }

    /* ── MEDIA LAYER ── */
    .media-wrap {
      position: absolute; inset: 0; z-index: 0;
    }
    .media-wrap img,
    .media-wrap video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block; position: absolute; inset: 0;
    }

    .media-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(10,7,20,0.05) 0%,
        rgba(10,7,20,0.62) 100%
      );
    }

    .media-content {
      position: absolute; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 8%;
    }

    /* ── GOLD GLOW BUTTONS ── */
    .btn-gold {
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 800;
      letter-spacing: 0.18em;
      color: #3B1265;
      background: linear-gradient(135deg, #E2C98A, #C8A96E);
      border: none;
      border-radius: 50px;
      padding: 15px 54px;
      cursor: pointer;
      box-shadow: 
        0 0 20px rgba(226,201,138,0.6),
        0 0 40px rgba(200,169,110,0.4),
        0 4px 24px rgba(200,169,110,0.5);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 0 30px rgba(226,201,138,0.8),
        0 0 60px rgba(200,169,110,0.6),
        0 8px 32px rgba(200,169,110,0.7);
    }
    .btn-gold:active { transform: scale(0.96); }

    /* Gold outline — Quit, CLOSE */
    .btn-outline {
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.8rem, 2.2vw, 0.92rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #E2C98A;
      background: rgba(200,169,110,0.12);
      border: 1.5px solid rgba(200,169,110,0.55);
      border-radius: 50px;
      padding: 12px 36px;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(200,169,110,0.3);
      transition: transform 0.16s ease, border-color 0.16s, background 0.16s, box-shadow 0.16s;
    }
    .btn-outline:hover {
      transform: translateY(-2px);
      border-color: #C8A96E;
      background: rgba(200,169,110,0.22);
      box-shadow: 0 0 24px rgba(200,169,110,0.5);
    }
    .btn-outline:active { transform: scale(0.96); }

    /* ── LOADING ── */
    #screen-loading {
      background: #1a0835;
    }
    .loading-text {
      font-family: 'Cinzel', serif;
      color: #C8A96E;
      font-size: clamp(0.75rem, 2vw, 0.88rem);
      letter-spacing: 0.12em;
      animation: pulse 1.8s ease-in-out infinite;
    }

    /* ── ERROR ── */
    #screen-error {
      background: #1a0835;
      padding: 32px;
      text-align: center;
      gap: 14px;
    }
    #screen-error strong {
      font-family: 'Cinzel', serif;
      color: #C8A96E;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
    }
    #screen-error p {
      color: rgba(255,255,255,0.55);
      font-size: clamp(0.75rem, 2vw, 0.85rem);
      line-height: 1.6;
    }

    /* ── CONSENT SCREEN ── */
    #screen-consent {
      background: radial-gradient(ellipse at center, #2d1b4e 0%, #1a0835 100%);
    }

    .consent-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(32px, 8%, 48px);
      padding: 32px;
      width: 100%;
      height: 100%;
    }

    .consent-text {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.5rem, 5.5vw, 2rem);
      font-weight: 700;
      color: #E2C98A;
      letter-spacing: 0.08em;
      text-align: center;
      text-shadow: 0 0 20px rgba(226,201,138,0.4);
    }

    /* ── INTRO SCREEN ── */
    #screen-intro {
      background: radial-gradient(ellipse at center, #5A2090 0%, #1a0835 100%);
    }

    /* ── PUZZLE SCREEN ── */
    #screen-puzzle {
      background: radial-gradient(ellipse at center, #2d1b4e 0%, #1a0835 100%);
    }

    .puzzle-header {
      text-align: center;
      margin-top: 2%;
    }

    .puzzle-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 700;
      color: #E2C98A;
      letter-spacing: 0.08em;
      margin: 0;
      text-shadow: 
        0 0 10px rgba(226,201,138,0.8),
        0 0 20px rgba(226,201,138,0.6),
        0 0 30px rgba(226,201,138,0.4);
    }

    .puzzle-subtitle {
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.75rem, 2vw, 0.88rem);
      color: rgba(226,201,138,0.7);
      letter-spacing: 0.1em;
    }

    /* Puzzle Grid Wrapper — always relative to device container, never viewport */
    .puzzle-grid-wrapper {
      position: relative;
      width: 88%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px auto;
    }

    /* Word Search Grid — Transparent Glass Design */
    .grid-container {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(12, 1fr);
      gap: 2px;
      background: rgba(10,7,20,0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 6px;
      width: 100%;
      height: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      touch-action: none;
      user-select: none;
    }

    .grid-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(10px, 2.5vmin, 18px);
      font-weight: 700;
      color: #E2C98A;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.08s;
      border: 1px solid transparent;
    }

    .grid-cell:hover {
      background: rgba(226,201,138,0.15);
    }

    .grid-cell.selected {
      background: rgba(226,201,138,0.45);
      border-color: rgba(226,201,138,0.5);
      color: #fff;
    }

    .grid-cell.found {
      background: rgba(34,197,94,0.35);
      border-color: rgba(34,197,94,0.5);
      color: #fff;
      pointer-events: none;
    }

    /* Watermark Footer */
    .watermark {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Open Sans', sans-serif;
      font-size: 9px;
      color: rgba(226,201,138,0.5);
      z-index: 10;
      padding: 0 16px;
      line-height: 1.4;
    }

    /* Exit Icon Button — glassmorphism matches grid */
    .exit-icon {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      width: 44px;
      height: 44px;
      background: rgba(10,7,20,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .exit-icon:hover {
      background: rgba(10,7,20,0.65);
      border-color: rgba(226,201,138,0.35);
      transform: scale(1.05);
    }
    .exit-icon svg {
      width: 20px;
      height: 20px;
      stroke: #E2C98A;
      stroke-width: 2;
    }

    /* Desktop / Tablet / Mobile — grid stays container-relative, no vw overrides needed */

    /* Word List */
    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      justify-content: center;
      padding: 0 12px;
    }

    .word-item {
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.7rem, 1.8vw, 0.82rem);
      font-weight: 600;
      color: rgba(226,201,138,0.6);
      padding: 6px 14px;
      background: rgba(200,169,110,0.1);
      border-radius: 20px;
      border: 1px solid rgba(200,169,110,0.3);
      letter-spacing: 0.08em;
      transition: all 0.2s ease;
    }

    .word-item.found {
      color: #86efac;
      background: rgba(34,197,94,0.2);
      border-color: rgba(34,197,94,0.4);
      text-decoration: line-through;
    }

    /* Puzzle Buttons */
    .puzzle-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: auto;
      padding-bottom: 3%;
    }


    /* ── FINALE SCREEN ── */
    #screen-finale {
      background: #1a0835;
    }

    .finale-buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── ANIMATIONS ── */
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.85; }
    }
  </style>
</head>
<body>

<div class="device" id="device">

  <!-- ── LOADING ── -->
  <div class="screen active" id="screen-loading">
    <span class="loading-text">Loading…</span>
  </div>

  <!-- ── ERROR ── -->
  <div class="screen" id="screen-error">
    <strong>Puzzle not found</strong>
    <p>This link may be invalid<br>or the puzzle has been removed.</p>
  </div>

  <!-- ── CONSENT SCREEN ── -->
  <div class="screen" id="screen-consent">
    <div class="media-wrap" id="consentMediaWrap"></div>
    <div class="media-overlay"></div>
    <div class="media-content">
      <div class="consent-container">
        <p class="consent-text">Ready to begin?</p>
        <button class="btn-gold" id="btnConsent">PLAY</button>
      </div>
    </div>
    <div class="watermark">Designed & built with ❤️ by <strong>Claude (Anthropic)</strong> × Chef Anica<br>3C Thread To Success Cooking Lab 🧪👨‍🍳</div>
  </div>

  <!-- ── INTRO SCREEN ── -->
  <div class="screen" id="screen-intro">
    <div class="media-wrap" id="introMediaWrap"></div>
    <div class="media-overlay"></div>
    <div class="media-content">
      <button class="btn-gold" id="btnStart">LET'S GO</button>
    </div>
  </div>

  <!-- ── PUZZLE SCREEN ── -->
  <div class="screen" id="screen-puzzle">
    <div class="media-wrap" id="puzzleMediaWrap"></div>
    <div class="media-overlay"></div>
    <div class="media-content" style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 9% 4% 3%;">
      <div class="puzzle-header">
        <h1 class="puzzle-title" id="puzzleTitle">Word Search</h1>
        <p class="puzzle-subtitle" id="puzzleSubtitle">Find all the hidden words</p>
      </div>

      <div class="puzzle-grid-wrapper">
        <div class="grid-container" id="gridContainer"></div>
      </div>

      <div class="word-list" id="wordList"></div>

      <div class="puzzle-buttons">
        <button class="btn-gold" id="btnGoOn" style="display:none;">GO ON</button>
      </div>
      
      <!-- Exit Icon -->
      <div class="exit-icon" id="btnQuit" title="Quit">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- ── FINALE SCREEN ── -->
  <div class="screen" id="screen-finale">
    <div class="media-wrap" id="finaleMediaWrap"></div>
    <div class="media-overlay"></div>
    <div class="media-content">
      <div class="finale-buttons">
        <button class="btn-gold" id="btnRestart">BACK</button>
        <button class="btn-outline" id="btnClose">CLOSE</button>
      </div>
    </div>
  </div>

</div><!-- /device -->

<script>
/* ══════════════════════════════════════════════════
   3C Word Search — Public App
   ──────────────────────────────────────────────────
   ONE JSON fetched once → stored in memory as `puzzle`
   
   JSON structure:
   {
     puzzle_slug: 'puzzle.01',
     title: 'Puzzle Title',
     word_list: ['WORD1', 'WORD2', ...],
     grid: [['A','B','C',...], ...],
     placements: [{word, row, col, dir}, ...],
     bg_image: 'url',
     intro_asset: 'url',
     finale_asset: 'url'
   }
══════════════════════════════════════════════════ */

  const WORKER_URL = 'https://3c-wordsearch.3c-innertherapy.workers.dev';

  /* ── STATE ── */
  let puzzle = null;
  let currentScreen = 'screen-loading';
  let userConsented = false;
  let finaleLoaded = false;
  let foundWords = new Set();
  let selectedCells = [];

  /* ── HELPERS ── */
  function getPuzzleSlug() {
    return new URLSearchParams(window.location.search).get('puzzle');
  }

  function isVideo(url) {
    return /\.(mp4|webm|mov|ogg)$/i.test(url || '');
  }

  /* ── SCREEN TRANSITION ── */
  function goTo(id) {
    const from = document.getElementById(currentScreen);
    const to = document.getElementById(id);
    if (!from || !to || currentScreen === id) return;

    from.querySelectorAll('video').forEach(v => v.pause());

    from.classList.add('fading');
    setTimeout(() => {
      from.classList.remove('active', 'fading');
      to.classList.add('active');
      currentScreen = id;
      onScreenActivate(id);
      to.querySelectorAll('video').forEach(v => v.play().catch(() => {}));
    }, 400);
  }

  /* ── SCREEN ACTIVATE ── */
  function onScreenActivate(id) {
    switch (id) {
      case 'screen-consent':
        loadMedia('consentMediaWrap', puzzle.bg_image);
        break;
      case 'screen-intro':
        loadMedia('introMediaWrap', puzzle.intro_asset);
        break;
      case 'screen-puzzle':
        loadMedia('puzzleMediaWrap', puzzle.bg_image);
        buildPuzzleGrid();
        break;
      case 'screen-finale':
        if (!finaleLoaded) {
          loadMedia('finaleMediaWrap', puzzle.finale_asset);
          finaleLoaded = true;
        }
        break;
    }
  }

  /* ── LOAD MEDIA ── */
  function loadMedia(wrapId, url) {
    const wrap = document.getElementById(wrapId);
    if (!wrap || !url || wrap.children.length > 0) return;

    if (isVideo(url)) {
      const v = document.createElement('video');
      v.autoplay = true;
      v.muted = !userConsented;
      v.loop = true;
      v.playsInline = true;
      v.controls = false;
      const s = document.createElement('source');
      s.src = url;
      s.type = 'video/mp4';
      v.appendChild(s);
      wrap.appendChild(v);

      if (userConsented) {
        v.addEventListener('loadeddata', () => {
          v.muted = false;
          v.play().catch(() => { v.muted = true; });
        }, { once: true });
      }
    } else {
      const img = document.createElement('img');
      img.src = url;
      img.alt = '';
      wrap.appendChild(img);
    }
  }

  /* ── BUILD PUZZLE GRID ── */
  function buildPuzzleGrid() {
    if (!puzzle || !puzzle.grid || !puzzle.word_list) return;

    const container = document.getElementById('gridContainer');
    const wordListEl = document.getElementById('wordList');
    const titleEl = document.getElementById('puzzleTitle');
    const subtitleEl = document.getElementById('puzzleSubtitle');

    if (titleEl) titleEl.textContent = puzzle.title || 'Word Search';
    if (subtitleEl) subtitleEl.textContent = `Find ${puzzle.word_list.length} words`;

    container.innerHTML = '';
    wordListEl.innerHTML = '';

    // Build grid
    puzzle.grid.forEach((row, r) => {
      row.forEach((letter, c) => {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.textContent = letter;
        cell.dataset.row = r;
        cell.dataset.col = c;
        cell.onclick = () => selectCell(r, c);
        container.appendChild(cell);
      });
    });

    // Build word list
    puzzle.word_list.forEach(word => {
      const item = document.createElement('div');
      item.className = 'word-item';
      item.textContent = word;
      item.dataset.word = word;
      wordListEl.appendChild(item);
    });
  }

  /* ── WORD SEARCH LOGIC ── */
  function selectCell(row, col) {
    const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
    if (!cell || cell.classList.contains('found')) return;

    if (cell.classList.contains('selected')) {
      cell.classList.remove('selected');
      selectedCells = selectedCells.filter(c => !(c.row === row && c.col === col));
    } else {
      cell.classList.add('selected');
      selectedCells.push({ row, col, letter: cell.textContent });
      checkWord();
    }
  }

  function checkWord() {
    if (selectedCells.length < 2) return;

    const word = selectedCells.map(c => c.letter).join('');
    const reverseWord = word.split('').reverse().join('');

    // Check both forward and backward
    const matchedWord = puzzle.word_list.find(w => w === word || w === reverseWord);
    
    if (matchedWord && !foundWords.has(matchedWord)) {
      foundWords.add(matchedWord);
      markWordFound(matchedWord);
      clearSelection();
      checkCompletion();
    }
  }

  function markWordFound(word) {
    selectedCells.forEach(({ row, col }) => {
      const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
      if (cell) cell.classList.add('found');
    });

    const wordItem = document.querySelector(`[data-word="${word}"]`);
    if (wordItem) wordItem.classList.add('found');
  }

  function clearSelection() {
    document.querySelectorAll('.grid-cell.selected').forEach(c => c.classList.remove('selected'));
    selectedCells = [];
  }

  function checkCompletion() {
    if (foundWords.size === puzzle.word_list.length) {
      document.getElementById('btnGoOn').style.display = 'inline-block';
    }
  }

  function resetPuzzle() {
    foundWords.clear();
    selectedCells = [];
    finaleLoaded = false;
    document.getElementById('finaleMediaWrap').innerHTML = '';
    document.getElementById('btnGoOn').style.display = 'none';
  }

  /* ── WIRE BUTTONS ── */
  function wireButtons() {
    document.getElementById('btnConsent').onclick = () => {
      userConsented = true;
      goTo('screen-intro');
    };

    document.getElementById('btnStart').onclick = () => goTo('screen-puzzle');

    document.getElementById('btnQuit').onclick = () => {
      if (confirm('Are you sure you want to quit?')) {
        window.location.href = `../landing.html?puzzle=${encodeURIComponent(getPuzzleSlug())}`;
      }
    };

    document.getElementById('btnGoOn').onclick = () => goTo('screen-finale');

    document.getElementById('btnRestart').onclick = () => {
      resetPuzzle();
      goTo('screen-intro');
    };

    document.getElementById('btnClose').onclick = () => {
      window.close();
      setTimeout(() => {
        window.location.href = `../landing.html?puzzle=${encodeURIComponent(getPuzzleSlug())}`;
      }, 300);
    };
  }

  /* ── INIT ── */
  async function init() {
    const slug = getPuzzleSlug();
    if (!slug) { goTo('screen-error'); return; }

    try {
      const cached = sessionStorage.getItem('wsPuzzle');
      if (cached) {
        try {
          const data = JSON.parse(cached);
          if (data.puzzle_slug === slug) {
            puzzle = data;
          }
        } catch {}
      }

      if (!puzzle) {
        const res = await fetch(`${WORKER_URL}/puzzle/${slug}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        puzzle = await res.json();
        sessionStorage.setItem('wsPuzzle', JSON.stringify(puzzle));
      }

      wireButtons();
      goTo('screen-consent');
    } catch (err) {
      console.error('Puzzle load failed:', err);
      goTo('screen-error');
    }
  }

  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
