<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing Out · 3C Word Search</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: "Open Sans", sans-serif;
      background: linear-gradient(135deg, #0a0714 0%, #1a0b2e 50%, #0d0920 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      width: 90%;
      max-width: 420px;
      background: rgba(19,15,36,0.95);
      border: 1.5px solid rgba(124,58,237,0.35);
      border-radius: 18px;
      padding: 44px 40px 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 60px rgba(124,58,237,0.1);
      text-align: center;
    }
    .logo {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(124,58,237,0.4);
      box-shadow: 0 0 20px rgba(124,58,237,0.25);
      margin-bottom: 18px;
    }
    h1 { font-size: 20px; font-weight: 700; color: #c4b5f5; margin-bottom: 4px; }
    p.sub { font-size: 13px; color: #86efac; margin-bottom: 28px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(124,58,237,0.2);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .footer { margin-top: 26px; color: rgba(89,74,122,0.8); font-size: 11px; line-height: 1.6; }
    .footer strong { color: #7c3aed; }
  </style>
</head>
<body>
  <div class="box">
    <img src="./3C Thread To Success logo.png" alt="3C" class="logo" />
    <h1>Signing Out</h1>
    <p class="sub">✓ Session cleared successfully</p>
    <div class="spinner"></div>
    <p style="font-size:12px;color:#594a7a;margin-top:16px;">Redirecting to login...</p>
    <div class="footer">
      Built with ❤️ by <strong>Claude (Anthropic)</strong> × Chef Anica<br>
      3C Thread To Success Cooking Lab 🧪👨‍🍳
    </div>
  </div>
  <script>
    // Clear session
    localStorage.removeItem('github-user');
    localStorage.removeItem('session-expiry');
    
    // Redirect to login after 1.5 seconds
    setTimeout(() => {
      window.location.href = './login.html';
    }, 1500);
  </script>
</body>
</html>
