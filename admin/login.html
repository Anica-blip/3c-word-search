<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · 3C Word Search Admin</title>
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: "Open Sans", sans-serif;
      background: linear-gradient(135deg, #0a0714 0%, #1a0b2e 50%, #0d0920 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      width: 90%;
      max-width: 420px;
      background: rgba(19,15,36,0.95);
      border: 1.5px solid rgba(124,58,237,0.35);
      border-radius: 18px;
      padding: 44px 40px 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 60px rgba(124,58,237,0.1);
      text-align: center;
    }
    .logo {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(124,58,237,0.4);
      box-shadow: 0 0 20px rgba(124,58,237,0.25);
      margin-bottom: 18px;
    }
    h1 { font-size: 20px; font-weight: 700; color: #c4b5f5; margin-bottom: 4px; }
    p.sub { font-size: 12px; color: #594a7a; margin-bottom: 28px; }
    .error-message, .success-message {
      padding: 10px 14px; border-radius: 8px;
      margin-bottom: 16px; font-size: 13px; font-weight: 500; display: none;
    }
    .error-message.show   { display: block; background: rgba(220,38,38,0.12); border: 1px solid rgba(220,38,38,0.3); color: #fca5a5; }
    .success-message.show { display: block; background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3);  color: #86efac; }
    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      border: none; border-radius: 10px;
      color: #fff; font-family: "Open Sans", sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 20px rgba(124,58,237,0.35);
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(124,58,237,0.55); }
    .footer { margin-top: 26px; color: rgba(89,74,122,0.8); font-size: 11px; line-height: 1.6; }
    .footer strong { color: #7c3aed; }
  </style>
</head>
<body>
  <div class="box">
    <img src="./3C Thread To Success logo.png" alt="3C" class="logo" />
    <h1>3C Word Search Admin</h1>
    <p class="sub">Admin Access Only</p>
    <div id="error-message"   class="error-message"></div>
    <div id="success-message" class="success-message"></div>
    <a href="#" class="btn" id="github-btn" onclick="handleGitHubLogin(event)">
      <svg width="19" height="19" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
      </svg>
      GitHub Access Connection
    </a>
    <div class="footer">
      Built with ❤️ by <strong>Claude (Anthropic)</strong> × Chef Anica<br>
      3C Thread To Success Cooking Lab 🧪👨‍🍳
    </div>
  </div>
  <script src="./config.js"></script>
  <script src="./auth.js"></script>
</body>
</html>
